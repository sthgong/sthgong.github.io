<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动画贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .background-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 800px;
            width: 95%;
        }

        .game-header {
            margin-bottom: 25px;
        }

        .game-title {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255, 107, 107, 0.5)); }
            100% { filter: drop-shadow(0 0 20px rgba(78, 205, 196, 0.8)); }
        }

        .game-subtitle {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .game-canvas-container {
            position: relative;
            margin: 0 auto 25px;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .game-canvas {
            display: block;
            background: rgba(0, 0, 0, 0.3);
            cursor: none;
        }

        .custom-cursor {
            position: absolute;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 1000;
            transition: transform 0.1s ease-out;
        }

        .cursor-inner {
            width: 8px;
            height: 8px;
            background: #4ecdc4;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s infinite;
        }

        .cursor-outer {
            width: 30px;
            height: 30px;
            border: 2px solid #ff6b6b;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 3s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
        }

        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .game-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            border: none;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .control-btn:hover::before {
            left: 100%;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
        }

        .control-btn:active {
            transform: translateY(-1px);
        }

        .control-btn.start {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
        }

        .control-btn.start:hover {
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
        }

        .game-instructions {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
        }

        .instructions-title {
            color: white;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .instructions-content {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        .snake-segment {
            transition: all 0.2s ease;
        }

        .food {
            animation: foodGlow 2s ease-in-out infinite alternate;
        }

        @keyframes foodGlow {
            0% { filter: drop-shadow(0 0 5px #ff6b6b); transform: scale(1); }
            100% { filter: drop-shadow(0 0 15px #ff6b6b); transform: scale(1.1); }
        }

        .snake-head {
            animation: headPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes headPulse {
            0% { filter: drop-shadow(0 0 5px #4ecdc4); }
            100% { filter: drop-shadow(0 0 15px #4ecdc4); }
        }

        .trail-effect {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(78, 205, 196, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: trailFade 1s forwards;
        }

        @keyframes trailFade {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            z-index: 100;
            display: none;
            animation: gameOverFade 0.5s ease-out;
        }

        @keyframes gameOverFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .game-over h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #ff6b6b;
        }

        .restart-btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.5);
        }

        @media (max-width: 768px) {
            .game-info {
                grid-template-columns: 1fr;
            }
            
            .game-controls {
                grid-template-columns: 1fr;
            }
            
            .game-title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="background-effects" id="backgroundEffects"></div>
    
    <div class="custom-cursor" id="customCursor">
        <div class="cursor-inner"></div>
        <div class="cursor-outer"></div>
    </div>

    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">🐍 动画贪吃蛇</h1>
            <p class="game-subtitle">丰富的动画特效，炫酷的视觉体验</p>
        </div>
        
        <div class="game-canvas-container">
            <canvas id="gameCanvas" class="game-canvas" width="600" height="400"></canvas>
            <div class="game-over" id="gameOver">
                <h2>游戏结束!</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <p>最长长度: <span id="finalLength">0</span></p>
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <div class="game-info">
            <div class="info-card">
                <div class="info-label">当前得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-card">
                <div class="info-label">蛇的长度</div>
                <div class="info-value" id="length">3</div>
            </div>
            <div class="info-card">
                <div class="info-label">游戏速度</div>
                <div class="info-value" id="speed">正常</div>
            </div>
        </div>
        
        <div class="game-controls">
            <button class="control-btn start" onclick="startGame()">🚀 开始游戏</button>
            <button class="control-btn" onclick="pauseGame()">⏸️ 暂停游戏</button>
        </div>
        
        <div class="game-instructions">
            <div class="instructions-title">🎮 游戏说明</div>
            <div class="instructions-content">
                <p><strong>控制方式:</strong> 键盘方向键 ↑↓←→ 控制蛇的移动方向</p>
                <p><strong>游戏目标:</strong> 吃掉红色食物增长长度，避免撞墙或撞到自己</p>
                <p><strong>特效动画:</strong> 鼠标移动有轨迹，食物发光，蛇头呼吸效果</p>
            </div>
        </div>
    </div>

    <script>
        class SnakeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gridSize = 20;
                this.tileCount = this.canvas.width / this.gridSize;
                
                this.snake = [
                    {x: 10, y: 10},
                    {x: 9, y: 10},
                    {x: 8, y: 10}
                ];
                this.food = {x: 15, y: 15};
                this.direction = {x: 1, y: 0};
                this.nextDirection = {x: 1, y: 0};
                
                this.gameSpeed = 150;
                this.score = 0;
                this.gameRunning = false;
                this.gamePaused = false;
                
                this.trails = [];
                this.particles = [];
                
                this.init();
            }
            
            init() {
                this.createBackgroundParticles();
                this.bindEvents();
                this.gameLoop();
            }
            
            createBackgroundParticles() {
                const container = document.getElementById('backgroundEffects');
                for (let i = 0; i < 50; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 6 + 's';
                    particle.style.animationDuration = (3 + Math.random() * 4) + 's';
                    container.appendChild(particle);
                }
            }
            
            bindEvents() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.gamePaused) return;
                    
                    switch(e.key) {
                        case 'ArrowUp':
                            if (this.direction.y === 0) this.nextDirection = {x: 0, y: -1};
                            break;
                        case 'ArrowDown':
                            if (this.direction.y === 0) this.nextDirection = {x: 0, y: 1};
                            break;
                        case 'ArrowLeft':
                            if (this.direction.x === 0) this.nextDirection = {x: -1, y: 0};
                            break;
                        case 'ArrowRight':
                            if (this.direction.x === 0) this.nextDirection = {x: 1, y: 0};
                            break;
                    }
                });
                
                // 鼠标移动效果
                this.canvas.addEventListener('mousemove', (e) => {
                    this.createMouseTrail(e);
                    this.updateCursorPosition(e);
                });
                
                // 鼠标点击效果
                this.canvas.addEventListener('click', (e) => {
                    this.createClickEffect(e);
                });
            }
            
            createMouseTrail(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 添加轨迹效果
                this.trails.push({
                    x: x,
                    y: y,
                    life: 1
                });
                
                // 限制轨迹数量
                if (this.trails.length > 10) {
                    this.trails.shift();
                }
            }
            
            updateCursorPosition(e) {
                const cursor = document.getElementById('customCursor');
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                // 鼠标靠近食物时的效果
                const rect = this.canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const foodX = this.food.x * this.gridSize;
                const foodY = this.food.y * this.gridSize;
                
                const distance = Math.sqrt(Math.pow(mouseX - foodX, 2) + Math.pow(mouseY - foodY, 2));
                
                if (distance < 50) {
                    cursor.style.transform = 'scale(1.5)';
                } else {
                    cursor.style.transform = 'scale(1)';
                }
            }
            
            createClickEffect(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 创建点击粒子效果
                for (let i = 0; i < 8; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1,
                        color: `hsl(${Math.random() * 360}, 100%, 60%)`
                    });
                }
            }
            
            startGame() {
                this.gameRunning = true;
                this.gamePaused = false;
                document.getElementById('gameOver').style.display = 'none';
            }
            
            pauseGame() {
                this.gamePaused = !this.gamePaused;
            }
            
            gameLoop() {
                if (this.gameRunning && !this.gamePaused) {
                    this.update();
                }
                this.draw();
                this.updateParticles();
                
                setTimeout(() => {
                    requestAnimationFrame(() => this.gameLoop());
                }, this.gameSpeed);
            }
            
            update() {
                this.direction = {...this.nextDirection};
                
                // 移动蛇头
                const head = {...this.snake[0]};
                head.x += this.direction.x;
                head.y += this.direction.y;
                
                // 检查碰撞
                if (this.checkCollision(head)) {
                    this.gameOver();
                    return;
                }
                
                this.snake.unshift(head);
                
                // 检查是否吃到食物
                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    this.generateFood();
                    this.createFoodEffect();
                    
                    // 每得50分加速
                    if (this.score % 50 === 0) {
                        this.gameSpeed = Math.max(50, this.gameSpeed - 10);
                        document.getElementById('speed').textContent = '加速!';
                    }
                } else {
                    this.snake.pop();
                }
                
                this.updateUI();
            }
            
            checkCollision(head) {
                // 撞墙
                if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
                    return true;
                }
                
                // 撞到自己
                for (let segment of this.snake) {
                    if (head.x === segment.x && head.y === segment.y) {
                        return true;
                    }
                }
                
                return false;
            }
            
            generateFood() {
                let newFood;
                do {
                    newFood = {
                        x: Math.floor(Math.random() * this.tileCount),
                        y: Math.floor(Math.random() * this.tileCount)
                    };
                } while (this.snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
                
                this.food = newFood;
            }
            
            createFoodEffect() {
                // 食物被吃掉的粒子效果
                const foodX = this.food.x * this.gridSize + this.gridSize / 2;
                const foodY = this.food.y * this.gridSize + this.gridSize / 2;
                
                for (let i = 0; i < 12; i++) {
                    this.particles.push({
                        x: foodX,
                        y: foodY,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: 1,
                        color: '#ff6b6b'
                    });
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('length').textContent = this.snake.length;
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格背景
                this.drawGrid();
                
                // 绘制轨迹
                this.drawTrails();
                
                // 绘制粒子
                this.drawParticles();
                
                // 绘制食物
                this.drawFood();
                
                // 绘制蛇
                this.drawSnake();
            }
            
            drawGrid() {
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x <= this.canvas.width; x += this.gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= this.canvas.height; y += this.gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
            }
            
            drawTrails() {
                this.trails.forEach((trail, index) => {
                    const alpha = trail.life;
                    this.ctx.fillStyle = `rgba(78, 205, 196, ${alpha})`;
                    this.ctx.beginPath();
                    this.ctx.arc(trail.x, trail.y, 10 * alpha, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    trail.life -= 0.1;
                });
                
                this.trails = this.trails.filter(trail => trail.life > 0);
            }
            
            drawParticles() {
                this.particles.forEach((particle, index) => {
                    this.ctx.fillStyle = particle.color;
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, 3 * particle.life, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.life -= 0.02;
                    particle.vx *= 0.98;
                    particle.vy *= 0.98;
                });
                
                this.particles = this.particles.filter(particle => particle.life > 0);
            }
            
            drawFood() {
                const x = this.food.x * this.gridSize;
                const y = this.food.y * this.gridSize;
                
                // 食物发光效果
                this.ctx.shadowColor = '#ff6b6b';
                this.ctx.shadowBlur = 15;
                
                this.ctx.fillStyle = '#ff6b6b';
                this.ctx.beginPath();
                this.ctx.arc(x + this.gridSize/2, y + this.gridSize/2, this.gridSize/2 - 2, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.shadowBlur = 0;
                
                // 食物内部细节
                this.ctx.fillStyle = '#ff5252';
                this.ctx.beginPath();
                this.ctx.arc(x + this.gridSize/2, y + this.gridSize/2, this.gridSize/4, 0, Math.PI * 2);
                this.ctx.fill();
            }
            
            drawSnake() {
                this.snake.forEach((segment, index) => {
                    const x = segment.x * this.gridSize;
                    const y = segment.y * this.gridSize;
                    
                    if (index === 0) {
                        // 蛇头
                        this.ctx.shadowColor = '#4ecdc4';
                        this.ctx.shadowBlur = 10;
                        this.ctx.fillStyle = '#4ecdc4';
                    } else {
                        // 蛇身
                        const progress = index / this.snake.length;
                        const hue = 160 + progress * 40;
                        this.ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                    }
                    
                    // 绘制蛇身段
                    this.ctx.fillRect(x + 1, y + 1, this.gridSize - 2, this.gridSize - 2);
                    
                    // 圆角效果
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    this.ctx.beginPath();
                    this.ctx.arc(x + this.gridSize - 3, y + 3, 2, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.shadowBlur = 0;
                });
            }
            
            updateParticles() {
                // 蛇移动时的粒子效果
                if (this.gameRunning && !this.gamePaused && Math.random() < 0.3) {
                    const tail = this.snake[this.snake.length - 1];
                    if (tail) {
                        const x = tail.x * this.gridSize + this.gridSize / 2;
                        const y = tail.y * this.gridSize + this.gridSize / 2;
                        
                        this.particles.push({
                            x: x,
                            y: y,
                            vx: (Math.random() - 0.5) * 2,
                            vy: (Math.random() - 0.5) * 2,
                            life: 1,
                            color: `hsl(${160 + Math.random() * 40}, 70%, 50%)`
                        });
                    }
                }
            }
            
            gameOver() {
                this.gameRunning = false;
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalLength').textContent = this.snake.length;
                document.getElementById('gameOver').style.display = 'block';
                
                // 游戏结束特效
                this.createGameOverEffect();
            }
            
            createGameOverEffect() {
                const head = this.snake[0];
                const x = head.x * this.gridSize + this.gridSize / 2;
                const y = head.y * this.gridSize + this.gridSize / 2;
                
                for (let i = 0; i < 30; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 12,
                        vy: (Math.random() - 0.5) * 12,
                        life: 1,
                        color: '#ff6b6b'
                    });
                }
            }
            
            restart() {
                this.snake = [
                    {x: 10, y: 10},
                    {x: 9, y: 10},
                    {x: 8, y: 10}
                ];
                this.generateFood();
                this.direction = {x: 1, y: 0};
                this.nextDirection = {x: 1, y: 0};
                this.score = 0;
                this.gameSpeed = 150;
                this.trails = [];
                this.particles = [];
                
                document.getElementById('speed').textContent = '正常';
                this.updateUI();
                this.startGame();
            }
        }
        
        // 全局函数
        let game;
        
        function startGame() {
            if (!game) {
                game = new SnakeGame();
            }
            game.startGame();
        }
        
        function pauseGame() {
            if (game) {
                game.pauseGame();
            }
        }
        
        function restartGame() {
            if (game) {
                game.restart();
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            game = new SnakeGame();
        });
    </script>
</body>
</html>
