<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D我的世界 - Minecraft 2D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 3px solid #8B4513;
            text-align: center;
            max-width: 1200px;
            width: 95%;
        }

        .game-header {
            margin-bottom: 20px;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 15px;
        }

        .game-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #228B22;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-subtitle {
            font-size: 1.2em;
            color: #556B2F;
            margin-bottom: 10px;
        }

        .game-content {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .game-canvas-container {
            flex: 3;
            position: relative;
        }

        .game-canvas {
            border: 3px solid #8B4513;
            border-radius: 10px;
            background: #87CEEB;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: crosshair;
        }

        .game-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .inventory {
            background: linear-gradient(135deg, #D2B48C, #F5DEB3);
            border: 2px solid #8B4513;
            border-radius: 10px;
            padding: 15px;
            min-height: 200px;
        }

        .inventory h3 {
            color: #8B4513;
            margin-bottom: 10px;
            text-align: center;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .inventory-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #8B4513;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .inventory-slot:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.9);
        }

        .inventory-slot.selected {
            border-color: #FFD700;
            box-shadow: 0 0 10px #FFD700;
        }

        .crafting {
            background: linear-gradient(135deg, #A9A9A9, #C0C0C0);
            border: 2px solid #696969;
            border-radius: 10px;
            padding: 15px;
        }

        .crafting h3 {
            color: #2F4F4F;
            margin-bottom: 10px;
            text-align: center;
        }

        .crafting-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .crafting-slot {
            width: 40px;
            height: 40px;
            border: 1px solid #696969;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
        }

        .craft-btn {
            background: linear-gradient(45deg, #32CD32, #228B22);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .craft-btn:hover {
            transform: scale(1.05);
        }

        .game-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .control-btn {
            background: linear-gradient(45deg, #4169E1, #1E90FF);
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .control-btn.mine {
            background: linear-gradient(45deg, #FF6347, #DC143C);
        }

        .control-btn.place {
            background: linear-gradient(45deg, #32CD32, #228B22);
        }

        .control-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            border: 1px solid #8B4513;
        }

        .control-info h3 {
            color: #8B4513;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            background: rgba(139, 69, 19, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .status-item {
            text-align: center;
        }

        .status-label {
            font-size: 0.9em;
            color: #556B2F;
        }

        .status-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #228B22;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        @media (max-width: 768px) {
            .game-content {
                flex-direction: column;
            }
            
            .game-controls {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .inventory-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        @keyframes blockBreak {
            0% { transform: scale(1); }
            50% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        .block-breaking {
            animation: blockBreak 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">2D我的世界</h1>
            <p class="game-subtitle">Minecraft 2D - 挖掘、建造、生存</p>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">生命值</div>
                <div class="status-value" id="health">❤️ 100</div>
            </div>
            <div class="status-item">
                <div class="status-label">饥饿值</div>
                <div class="status-value" id="hunger">🍖 100</div>
            </div>
            <div class="status-item">
                <div class="status-label">工具耐久</div>
                <div class="status-value" id="durability">⚒️ 100%</div>
            </div>
            <div class="status-item">
                <div class="status-label">时间</div>
                <div class="status-value" id="time">☀️ 白天</div>
            </div>
        </div>
        
        <div class="game-content">
            <div class="game-canvas-container">
                <canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas>
                <div class="tooltip" id="tooltip"></div>
            </div>
            
            <div class="game-sidebar">
                <div class="inventory">
                    <h3>🎒 物品栏</h3>
                    <div class="inventory-grid" id="inventoryGrid">
                        <!-- 物品栏格子将通过JavaScript动态生成 -->
                    </div>
                    <div>当前选择: <span id="selectedItem">空手</span></div>
                </div>
                
                <div class="crafting">
                    <h3>🔨 合成台</h3>
                    <div class="crafting-grid" id="craftingGrid">
                        <!-- 合成格子将通过JavaScript动态生成 -->
                    </div>
                    <button class="craft-btn" id="craftBtn">合成</button>
                    <div id="craftingResult">可合成物品将显示在这里</div>
                </div>
            </div>
        </div>
        
        <div class="game-controls">
            <button class="control-btn mine" id="btnMine">⛏️ 挖掘模式</button>
            <button class="control-btn place" id="btnPlace">🧱 放置模式</button>
            <button class="control-btn" id="btnCraft">🔨 打开合成</button>
            <button class="control-btn" id="btnInventory">🎒 整理背包</button>
        </div>
        
        <div class="control-info">
            <h3>🎮 游戏控制说明</h3>
            <p><strong>鼠标操作：</strong></p>
            <p>左键点击方块 - 挖掘/攻击 | 右键点击 - 放置方块/使用物品</p>
            <p><strong>键盘快捷键：</strong></p>
            <p>数字键 1-9 - 快速选择物品栏 | R - 切换模式 | C - 合成菜单</p>
            <p><strong>游戏特性：</strong></p>
            <p>• 挖掘资源 • 建造建筑 • 合成工具 • 生存挑战</p>
        </div>
    </div>

    <script>
        class Minecraft2D {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.blockSize = 40;
                this.worldWidth = 100;  // 扩大地图
        this.worldHeight = 50;
        this.cameraX = 0;
        this.cameraY = 0;
        this.playerX = 20;
        this.playerY = 25;
        this.playerSpeed = 0.2;
        this.playerDirection = 'right'; // 'left' 或 'right'
        this.selectedBlock = null;
        this.selectedTool = null;
        this.gameMode = 'mine'; // 'mine' 或 'place'
        this.inventory = {};
        this.craftingSlots = Array(9).fill(null);
        this.keys = {}; // 跟踪按键状态
        this.animationFrame = 0;
                
                // 方块类型定义
                this.blockTypes = {
                    'air': { name: '空气', color: '#87CEEB', breakable: false },
                    'grass': { name: '草方块', color: '#7CFC00', breakable: true, tool: 'shovel', drops: 'dirt' },
                    'dirt': { name: '泥土', color: '#8B4513', breakable: true, tool: 'shovel', drops: 'dirt' },
                    'stone': { name: '石头', color: '#808080', breakable: true, tool: 'pickaxe', drops: 'cobblestone' },
                    'wood': { name: '木头', color: '#8B4513', breakable: true, tool: 'axe', drops: 'wood' },
                    'leaves': { name: '树叶', color: '#228B22', breakable: true, tool: 'shears', drops: 'leaves' },
                    'water': { name: '水', color: '#1E90FF', breakable: false },
                    'sand': { name: '沙子', color: '#F4A460', breakable: true, tool: 'shovel', drops: 'sand' },
                    'coal': { name: '煤矿石', color: '#2F4F4F', breakable: true, tool: 'pickaxe', drops: 'coal' },
                    'iron': { name: '铁矿石', color: '#D3D3D3', breakable: true, tool: 'pickaxe', drops: 'iron_ore' },
                    'gold': { name: '金矿石', color: '#FFD700', breakable: true, tool: 'pickaxe', drops: 'gold_ore' },
                    'diamond': { name: '钻石矿石', color: '#00BFFF', breakable: true, tool: 'pickaxe', drops: 'diamond' }
                };
                
                // 物品定义（添加图标）
                this.itemTypes = {
                    'dirt': { name: '泥土', color: '#8B4513', icon: '🌱', stackable: true },
                    'stone': { name: '石头', color: '#808080', icon: '🪨', stackable: true },
                    'wood': { name: '木头', color: '#8B4513', icon: '🪵', stackable: true },
                    'coal': { name: '煤炭', color: '#2F4F4F', icon: '⚫', stackable: true },
                    'iron_ore': { name: '铁矿石', color: '#D3D3D3', icon: '🔩', stackable: true },
                    'gold_ore': { name: '金矿石', color: '#FFD700', icon: '💰', stackable: true },
                    'diamond': { name: '钻石', color: '#00BFFF', icon: '💎', stackable: true },
                    'stick': { name: '木棍', color: '#DEB887', icon: '📏', stackable: true },
                    'pickaxe': { name: '木镐', color: '#8B4513', icon: '⛏️', stackable: false, durability: 100 },
                    'axe': { name: '木斧', color: '#8B4513', icon: '🪓', stackable: false, durability: 100 },
                    'shovel': { name: '木锹', color: '#8B4513', icon: '🪚', stackable: false, durability: 100 },
                    'sword': { name: '木剑', color: '#8B4513', icon: '⚔️', stackable: false, durability: 100 }
                };
                
                // 合成配方（改进版）
                this.recipes = {
                    'stick': { 
                        pattern: ['wood', null, null, 'wood', null, null, null, null, null], 
                        result: 'stick', 
                        count: 4,
                        description: '2个木头 → 4个木棍'
                    },
                    'pickaxe': { 
                        pattern: ['wood', 'wood', 'wood', null, 'stick', null, null, 'stick', null], 
                        result: 'pickaxe',
                        description: '3木头 + 2木棍 → 木镐'
                    },
                    'axe': { 
                        pattern: ['wood', 'wood', null, 'wood', 'stick', null, null, 'stick', null], 
                        result: 'axe',
                        description: '3木头 + 2木棍 → 木斧'
                    },
                    'shovel': { 
                        pattern: ['wood', null, null, 'stick', null, null, null, 'stick', null], 
                        result: 'shovel',
                        description: '1木头 + 2木棍 → 木锹'
                    },
                    'sword': { 
                        pattern: ['wood', null, null, 'wood', null, null, 'stick', null, null], 
                        result: 'sword',
                        description: '2木头 + 1木棍 → 木剑'
                    }
                };
                
                this.world = this.generateWorld();
                this.init();
                this.bindEvents();
                
                // 预加载玩家图像
                this.playerImage = this.createPlayerImage();
                this.gameLoop();
            }
            
            generateWorld() {
                const world = [];
                
                // 生成基础地形
                for (let y = 0; y < this.worldHeight; y++) {
                    const row = [];
                    for (let x = 0; x < this.worldWidth; x++) {
                        if (y < 5) {
                            // 天空层
                            row.push('air');
                        } else if (y === 5) {
                            // 草方块层
                            row.push('grass');
                        } else if (y < 10) {
                            // 泥土层
                            row.push('dirt');
                        } else if (y < 15) {
                            // 石头层
                            row.push('stone');
                        } else {
                            // 深层矿石
                            const rand = Math.random();
                            if (rand < 0.02) row.push('diamond');
                            else if (rand < 0.1) row.push('gold');
                            else if (rand < 0.3) row.push('iron');
                            else if (rand < 0.5) row.push('coal');
                            else row.push('stone');
                        }
                    }
                    world.push(row);
                }
                
                // 添加树木
                for (let i = 0; i < 10; i++) {
                    const treeX = Math.floor(Math.random() * (this.worldWidth - 3)) + 1;
                    const treeY = 4; // 在草方块上生成树
                    
                    // 树干
                    for (let y = treeY; y > treeY - 3; y--) {
                        if (y >= 0) world[y][treeX] = 'wood';
                    }
                    
                    // 树叶
                    for (let dy = -2; dy <= 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                            const leafY = treeY - 3 + dy;
                            const leafX = treeX + dx;
                            if (leafY >= 0 && leafX >= 0 && leafX < this.worldWidth && 
                                Math.abs(dx) + Math.abs(dy) <= 2) {
                                world[leafY][leafX] = 'leaves';
                            }
                        }
                    }
                }
                
                // 添加水域
                for (let i = 0; i < 3; i++) {
                    const waterX = Math.floor(Math.random() * (this.worldWidth - 5)) + 2;
                    const waterY = 6;
                    
                    for (let dy = 0; dy < 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                            world[waterY + dy][waterX + dx] = 'water';
                        }
                    }
                }
                
                return world;
            }
            
            init() {
                // 初始化物品栏
                this.inventory = {
                    'dirt': { count: 10 },
                    'wood': { count: 5 }
                };
                
                this.updateInventoryDisplay();
                this.updateCraftingDisplay();
            }
            
            bindEvents() {
                // 鼠标事件
                this.canvas.addEventListener('click', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left + this.cameraX;
                    const y = e.clientY - rect.top + this.cameraY;
                    const blockX = Math.floor(x / this.blockSize);
                    const blockY = Math.floor(y / this.blockSize);
                    
                    if (e.button === 0) { // 左键
                        this.handleLeftClick(blockX, blockY);
                    } else if (e.button === 2) { // 右键
                        this.handleRightClick(blockX, blockY);
                    }
                });
                
                this.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
                
                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'r': case 'R':
                            this.toggleMode();
                            break;
                        case 'c': case 'C':
                            this.openCrafting();
                            break;
                        case '1': case '2': case '3': case '4': case '5':
                        case '6': case '7': case '8': case '9':
                            this.selectInventorySlot(parseInt(e.key) - 1);
                            break;
                    }
                });
                
                // 按钮事件
                document.getElementById('btnMine').addEventListener('click', () => {
                    this.gameMode = 'mine';
                    this.updateModeButtons();
                });
                
                document.getElementById('btnPlace').addEventListener('click', () => {
                    this.gameMode = 'place';
                    this.updateModeButtons();
                });
                
                document.getElementById('btnCraft').addEventListener('click', () => {
                    this.openCrafting();
                });
                
                document.getElementById('craftBtn').addEventListener('click', () => {
                    this.craftItem();
                });
            }
            
            handleLeftClick(blockX, blockY) {
                if (this.gameMode === 'mine') {
                    this.mineBlock(blockX, blockY);
                }
            }
            
            handleRightClick(blockX, blockY) {
                if (this.gameMode === 'place' && this.selectedBlock) {
                    this.placeBlock(blockX, blockY);
                }
            }
            
            mineBlock(x, y) {
                if (x < 0 || x >= this.worldWidth || y < 0 || y >= this.worldHeight) return;
                
                const blockType = this.world[y][x];
                const blockInfo = this.blockTypes[blockType];
                
                if (blockInfo.breakable) {
                    // 播放挖掘动画
                    this.animateBlockBreak(x, y);
                    
                    // 添加到物品栏
                    if (blockInfo.drops) {
                        this.addToInventory(blockInfo.drops, 1);
                    }
                    
                    // 替换为空气
                    this.world[y][x] = 'air';
                    
                    this.updateInventoryDisplay();
                }
            }
            
            placeBlock(x, y) {
                if (x < 0 || x >= this.worldWidth || y < 0 || y >= this.worldHeight) return;
                
                const currentBlock = this.world[y][x];
                if (currentBlock === 'air' && this.selectedBlock) {
                    // 检查是否有足够的物品
                    if (this.inventory[this.selectedBlock] && this.inventory[this.selectedBlock].count > 0) {
                        this.world[y][x] = this.selectedBlock;
                        this.removeFromInventory(this.selectedBlock, 1);
                        this.updateInventoryDisplay();
                    }
                }
            }
            
            animateBlockBreak(x, y) {
                const canvasX = (x - this.cameraX) * this.blockSize;
                const canvasY = (y - this.cameraY) * this.blockSize;
                
                // 这里可以添加粒子效果或动画
                this.canvas.classList.add('block-breaking');
                setTimeout(() => {
                    this.canvas.classList.remove('block-breaking');
                }, 300);
            }
            
            addToInventory(item, count) {
                if (!this.inventory[item]) {
                    this.inventory[item] = { count: 0 };
                }
                this.inventory[item].count += count;
            }
            
            removeFromInventory(item, count) {
                if (this.inventory[item]) {
                    this.inventory[item].count -= count;
                    if (this.inventory[item].count <= 0) {
                        delete this.inventory[item];
                    }
                }
            }
            
            selectInventorySlot(slot) {
                const items = Object.keys(this.inventory);
                if (items[slot]) {
                    this.selectedBlock = items[slot];
                    document.getElementById('selectedItem').textContent = this.itemTypes[this.selectedBlock].name;
                }
            }
            
            toggleMode() {
                this.gameMode = this.gameMode === 'mine' ? 'place' : 'mine';
                this.updateModeButtons();
            }
            
            updateModeButtons() {
                document.getElementById('btnMine').classList.toggle('selected', this.gameMode === 'mine');
                document.getElementById('btnPlace').classList.toggle('selected', this.gameMode === 'place');
            }
            
            openCrafting() {
                // 显示合成界面
                alert('合成界面已打开！拖动物品到合成格中进行合成。');
            }
            
            craftItem() {
                let crafted = false;
                
                // 检查所有配方
                for (const [result, recipe] of Object.entries(this.recipes)) {
                    let canCraft = true;
                    
                    // 检查配方材料是否足够
                    for (let i = 0; i < 9; i++) {
                        const requiredItem = recipe.pattern[i];
                        if (requiredItem) {
                            if (!this.inventory[requiredItem] || this.inventory[requiredItem].count < 1) {
                                canCraft = false;
                                break;
                            }
                        }
                    }
                    
                    if (canCraft) {
                        // 消耗材料
                        for (let i = 0; i < 9; i++) {
                            const requiredItem = recipe.pattern[i];
                            if (requiredItem) {
                                this.removeFromInventory(requiredItem, 1);
                            }
                        }
                        
                        // 添加成品
                        this.addToInventory(result, recipe.count || 1);
                        
                        // 显示合成成功消息
                        const resultElement = document.getElementById('craftingResult');
                        resultElement.innerHTML = `
                            <div style="color: #228B22; font-weight: bold;">
                                ✅ 合成成功！
                            </div>
                            <div>获得: ${this.itemTypes[result].icon} ${this.itemTypes[result].name} ×${recipe.count || 1}</div>
                        `;
                        
                        crafted = true;
                        break;
                    }
                }
                
                if (!crafted) {
                    document.getElementById('craftingResult').innerHTML = `
                        <div style="color: #DC143C;">❌ 材料不足或配方不正确</div>
                    `;
                }
                
                this.updateInventoryDisplay();
            }
            
            updateCraftingDisplay() {
                const grid = document.getElementById('craftingGrid');
                grid.innerHTML = '';
                
                // 显示所有可合成的配方
                for (const [result, recipe] of Object.entries(this.recipes)) {
                    const recipeSlot = document.createElement('div');
                    recipeSlot.className = 'crafting-slot';
                    recipeSlot.style.cssText = `
                        grid-column: span 3;
                        text-align: left;
                        padding: 10px;
                        background: rgba(255,255,255,0.9);
                        border-radius: 8px;
                        margin-bottom: 5px;
                    `;
                    
                    // 检查是否可合成
                    let canCraft = true;
                    for (let i = 0; i < 9; i++) {
                        const requiredItem = recipe.pattern[i];
                        if (requiredItem) {
                            if (!this.inventory[requiredItem] || this.inventory[requiredItem].count < 1) {
                                canCraft = false;
                                break;
                            }
                        }
                    }
                    
                    recipeSlot.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="
                                font-size: 1.5em;
                                background: ${canCraft ? '#90EE90' : '#FFB6C1'};
                                padding: 5px;
                                border-radius: 5px;
                                width: 40px;
                                text-align: center;
                            ">${this.itemTypes[result].icon}</div>
                            <div>
                                <div style="font-weight: bold;">${this.itemTypes[result].name}</div>
                                <div style="font-size: 0.8em; color: #666;">${recipe.description}</div>
                                <div style="font-size: 0.8em; color: ${canCraft ? '#228B22' : '#DC143C'};">
                                    ${canCraft ? '✅ 可合成' : '❌ 材料不足'}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    if (canCraft) {
                        recipeSlot.style.cursor = 'pointer';
                        recipeSlot.addEventListener('click', () => {
                            this.craftSpecificRecipe(result);
                        });
                    }
                    
                    grid.appendChild(recipeSlot);
                }
            }
            
            craftSpecificRecipe(result) {
                const recipe = this.recipes[result];
                
                // 检查材料是否足够
                for (let i = 0; i < 9; i++) {
                    const requiredItem = recipe.pattern[i];
                    if (requiredItem) {
                        if (!this.inventory[requiredItem] || this.inventory[requiredItem].count < 1) {
                            alert('材料不足！');
                            return;
                        }
                    }
                }
                
                // 消耗材料
                for (let i = 0; i < 9; i++) {
                    const requiredItem = recipe.pattern[i];
                    if (requiredItem) {
                        this.removeFromInventory(requiredItem, 1);
                    }
                }
                
                // 添加成品
                this.addToInventory(result, recipe.count || 1);
                
                this.updateInventoryDisplay();
                this.updateCraftingDisplay();
                
                alert(`成功合成 ${this.itemTypes[result].icon} ${this.itemTypes[result].name} ×${recipe.count || 1}！`);
            }
            
            updateInventoryDisplay() {
                const grid = document.getElementById('inventoryGrid');
                grid.innerHTML = '';
                
                Object.keys(this.inventory).forEach((item, index) => {
                    const slot = document.createElement('div');
                    slot.className = 'inventory-slot';
                    
                    // 添加选中状态
                    if (item === this.selectedBlock || item === this.selectedTool) {
                        slot.classList.add('selected');
                    }
                    
                    slot.innerHTML = `
                        <div style="
                            background: ${this.itemTypes[item].color}; 
                            width: 40px; 
                            height: 40px; 
                            border-radius: 5px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 1.5em;
                            border: 2px solid rgba(0,0,0,0.3);
                        ">
                            ${this.itemTypes[item].icon}
                        </div>
                        <div style="
                            font-size: 0.7em; 
                            margin-top: 3px;
                            font-weight: bold;
                            color: #333;
                        ">${this.inventory[item].count}</div>
                        <div style="
                            font-size: 0.6em; 
                            color: #666;
                            text-align: center;
                        ">${this.itemTypes[item].name}</div>
                    `;
                    
                    slot.addEventListener('click', () => {
                        if (this.itemTypes[item].durability) {
                            // 如果是工具
                            this.selectedTool = item;
                            this.selectedBlock = null;
                            document.getElementById('selectedItem').textContent = `${this.itemTypes[item].name} (工具)`;
                        } else {
                            // 如果是方块
                            this.selectedBlock = item;
                            this.selectedTool = null;
                            document.getElementById('selectedItem').textContent = `${this.itemTypes[item].name} (方块)`;
                        }
                        this.updateInventoryDisplay(); // 重新渲染以更新选中状态
                    });
                    
                    grid.appendChild(slot);
                });
                
                // 更新状态栏
                this.updateStatusBar();
            }
            
            updateStatusBar() {
                // 更新工具耐久度
                let durability = 100;
                if (this.selectedTool && this.inventory[this.selectedTool]) {
                    durability = this.inventory[this.selectedTool].durability || 100;
                }
                document.getElementById('durability').textContent = `⚒️ ${durability}%`;
            }
            
            updateCraftingDisplay() {
                // 更新合成界面显示
            }
            
            gameLoop() {
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#87CEEB';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制世界
                for (let y = 0; y < this.worldHeight; y++) {
                    for (let x = 0; x < this.worldWidth; x++) {
                        const blockType = this.world[y][x];
                        const blockInfo = this.blockTypes[blockType];
                        
                        const screenX = (x - this.cameraX) * this.blockSize;
                        const screenY = (y - this.cameraY) * this.blockSize;
                        
                        if (screenX >= -this.blockSize && screenX <= this.canvas.width &&
                            screenY >= -this.blockSize && screenY <= this.canvas.height) {
                            
                            // 绘制方块
                            this.ctx.fillStyle = blockInfo.color;
                            this.ctx.fillRect(screenX, screenY, this.blockSize, this.blockSize);
                            
                            // 绘制方块边框
                            this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                            this.ctx.strokeRect(screenX, screenY, this.blockSize, this.blockSize);
                            
                            // 为特殊方块添加纹理
                            if (blockType === 'grass') {
                                this.ctx.fillStyle = '#32CD32';
                                this.ctx.fillRect(screenX, screenY, this.blockSize, this.blockSize * 0.2);
                            }
                        }
                    }
                }
                
                // 绘制玩家（史蒂夫）
                const playerScreenX = (this.playerX - this.cameraX) * this.blockSize;
                const playerScreenY = (this.playerY - this.cameraY) * this.blockSize;
                
                // 绘制玩家阴影
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                this.ctx.fillRect(playerScreenX + 2, playerScreenY + 2, this.blockSize, this.blockSize);
                
                // 绘制史蒂夫角色
                this.ctx.fillStyle = '#8B4513'; // 棕色裤子
                this.ctx.fillRect(playerScreenX, playerScreenY + this.blockSize * 0.6, this.blockSize, this.blockSize * 0.4);
                
                this.ctx.fillStyle = '#FFB6C1'; // 粉色皮肤
                this.ctx.fillRect(playerScreenX, playerScreenY, this.blockSize, this.blockSize * 0.6);
                
                this.ctx.fillStyle = '#0000FF'; // 蓝色上衣
                this.ctx.fillRect(playerScreenX, playerScreenY + this.blockSize * 0.2, this.blockSize, this.blockSize * 0.4);
                
                // 绘制脸部
                this.ctx.fillStyle = '#000000'; // 黑色眼睛
                const eyeOffset = this.playerDirection === 'right' ? 0.1 : -0.1;
                this.ctx.fillRect(playerScreenX + this.blockSize * (0.25 + eyeOffset), playerScreenY + this.blockSize * 0.3, this.blockSize * 0.1, this.blockSize * 0.1);
                this.ctx.fillRect(playerScreenX + this.blockSize * (0.65 + eyeOffset), playerScreenY + this.blockSize * 0.3, this.blockSize * 0.1, this.blockSize * 0.1);
                
                // 绘制手上的工具
                if (this.selectedTool) {
                    const toolX = playerScreenX + (this.playerDirection === 'right' ? this.blockSize : -this.blockSize * 0.5);
                    const toolY = playerScreenY + this.blockSize * 0.3;
                    
                    this.ctx.fillStyle = this.itemTypes[this.selectedTool].color;
                    this.ctx.fillRect(toolX, toolY, this.blockSize * 0.5, this.blockSize * 0.2);
                    
                    // 绘制工具图标
                    this.ctx.font = '20px Arial';
                    this.ctx.fillStyle = '#FFFFFF';
                    this.ctx.fillText(this.itemTypes[this.selectedTool].icon, toolX + 5, toolY + 15);
                }
                
                // 绘制选择框
                if (this.selectedBlock || this.selectedTool) {
                    this.ctx.strokeStyle = '#FFD700';
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeRect(playerScreenX, playerScreenY, this.blockSize, this.blockSize);
                }
                
                // 绘制UI信息
                this.drawUI();
            }
            
            drawUI() {
                // 绘制小地图
                const miniMapSize = 150;
                const miniMapX = this.canvas.width - miniMapSize - 10;
                const miniMapY = 10;
                
                // 小地图背景
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                this.ctx.fillRect(miniMapX, miniMapY, miniMapSize, miniMapSize);
                this.ctx.strokeStyle = '#8B4513';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(miniMapX, miniMapY, miniMapSize, miniMapSize);
                
                // 绘制小地图内容
                const scale = miniMapSize / Math.max(this.worldWidth, this.worldHeight);
                for (let y = 0; y < this.worldHeight; y++) {
                    for (let x = 0; x < this.worldWidth; x++) {
                        const blockType = this.world[y][x];
                        if (blockType !== 'air') {
                            this.ctx.fillStyle = this.blockTypes[blockType].color;
                            this.ctx.fillRect(
                                miniMapX + x * scale, 
                                miniMapY + y * scale, 
                                scale, 
                                scale
                            );
                        }
                    }
                }
                
                // 绘制玩家位置
                this.ctx.fillStyle = '#FF0000';
                this.ctx.fillRect(
                    miniMapX + this.playerX * scale - 2, 
                    miniMapY + this.playerY * scale - 2, 
                    4, 
                    4
                );
                
                // 绘制当前模式
                this.ctx.font = '16px Arial';
                this.ctx.fillStyle = '#000000';
                this.ctx.fillText(`模式: ${this.gameMode === 'mine' ? '挖掘' : '放置'}`, 10, 30);
                this.ctx.fillText(`工具: ${this.selectedTool ? this.itemTypes[this.selectedTool].name : '无'}`, 10, 50);
                this.ctx.fillText(`方块: ${this.selectedBlock ? this.itemTypes[this.selectedBlock].name : '无'}`, 10, 70);
            }
            
            createPlayerImage() {
                // 创建简单的玩家图像
                const canvas = document.createElement('canvas');
                canvas.width = this.blockSize;
                canvas.height = this.blockSize;
                const ctx = canvas.getContext('2d');
                
                // 绘制史蒂夫角色
                ctx.fillStyle = '#8B4513'; // 棕色裤子
                ctx.fillRect(0, this.blockSize * 0.6, this.blockSize, this.blockSize * 0.4);
                
                ctx.fillStyle = '#FFB6C1'; // 粉色皮肤
                ctx.fillRect(0, 0, this.blockSize, this.blockSize * 0.6);
                
                ctx.fillStyle = '#0000FF'; // 蓝色上衣
                ctx.fillRect(0, this.blockSize * 0.2, this.blockSize, this.blockSize * 0.4);
                
                // 绘制脸部
                ctx.fillStyle = '#000000'; // 黑色眼睛
                ctx.fillRect(this.blockSize * 0.25, this.blockSize * 0.3, this.blockSize * 0.1, this.blockSize * 0.1);
                ctx.fillRect(this.blockSize * 0.65, this.blockSize * 0.3, this.blockSize * 0.1, this.blockSize * 0.1);
                
                return canvas;
            }
        }
        
        // 初始化游戏
        window.addEventListener('load', () => {
            new Minecraft2D();
        });
    </script>
</body>
